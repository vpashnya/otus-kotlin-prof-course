version: "0.1"
services:
  app-ktor:
    build:
      context: .
    ports:
      - "8888:8080"
    environment:
      MODE: "PROD"
      PG_URL: "jdbc:postgresql://pgdb:5432/mydatabase"
      PG_USER: "myuser"
      PG_PASSWORD: "mypassword"
    depends_on:
      pgdb:
        condition: service_healthy

  pgdb:
    image: postgres:latest
    container_name: pgdb
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
